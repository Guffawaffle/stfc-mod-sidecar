name: Release Windows

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build-windows:
    runs-on: windows-2022
    environment: windows-release

    env:
      WIN_SIGN_MODE: azure
      WIN_PUBLISHER_NAME: ${{ vars.WIN_PUBLISHER_NAME }}
      AZURE_TRUSTED_SIGNING_ENDPOINT: ${{ vars.AZURE_TRUSTED_SIGNING_ENDPOINT }}
      AZURE_CODE_SIGNING_ACCOUNT_NAME: ${{ vars.AZURE_CODE_SIGNING_ACCOUNT_NAME }}
      AZURE_CERTIFICATE_PROFILE_NAME: ${{ vars.AZURE_CERTIFICATE_PROFILE_NAME }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check signing environment
        shell: pwsh
        run: |
          $required = @(
            "WIN_PUBLISHER_NAME",
            "AZURE_TRUSTED_SIGNING_ENDPOINT",
            "AZURE_CODE_SIGNING_ACCOUNT_NAME",
            "AZURE_CERTIFICATE_PROFILE_NAME",
            "AZURE_TENANT_ID",
            "AZURE_CLIENT_ID",
            "AZURE_CLIENT_SECRET"
          )

          $missing = @($required | Where-Object { -not [Environment]::GetEnvironmentVariable($_) })
          if ($missing.Count -gt 0) {
            throw "Missing signing environment values: $($missing -join ', ')"
          }

      - name: Validate
        run: npm run check

      - name: Build signed Windows artifacts
        run: npm run desktop:dist:win

      - name: Verify Authenticode signatures
        shell: pwsh
        run: |
          $signtool = (Get-Command signtool.exe -ErrorAction SilentlyContinue).Source
          if (-not $signtool) {
            $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Recurse -Filter signtool.exe -ErrorAction SilentlyContinue |
              Sort-Object FullName -Descending |
              Select-Object -First 1 -ExpandProperty FullName
          }

          if (-not $signtool) {
            throw "signtool.exe was not found"
          }

          $dist = Join-Path $PWD "packages\desktop\dist"
          $files = Get-ChildItem $dist -Filter "*.exe" -File
          if (-not $files) {
            throw "No .exe artifacts found in $dist"
          }

          foreach ($file in $files) {
            Write-Host "Verifying $($file.FullName)"
            & $signtool verify /pa /v $file.FullName
            if ($LASTEXITCODE -ne 0) {
              throw "signtool verification failed for $($file.FullName)"
            }

            $signature = Get-AuthenticodeSignature $file.FullName
            if ($signature.Status -ne "Valid") {
              throw "Authenticode status was $($signature.Status) for $($file.FullName)"
            }
          }

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-desktop-artifacts
          path: |
            packages/desktop/dist/*.exe
            packages/desktop/dist/*.blockmap

      - name: Upload GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            packages/desktop/dist/*.exe
            packages/desktop/dist/*.blockmap